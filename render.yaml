services:
  - type: web
    name: schoolos-backend
    env: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: python manage.py migrate && gunicorn school_backend.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: ALLOWED_HOSTS
        value: schoolos-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://schoolos-frontend.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://schoolos-frontend.vercel.app
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_RESET_PASSWORD
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: schoolos-db
          property: connectionString

databases:
  - name: schoolos-db
    databaseName: schoolos
    user: schoolos
